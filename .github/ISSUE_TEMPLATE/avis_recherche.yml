---
name: Avis de recherche
description: Créer une fiche de personne recherchée
title: "[RECHERCHE] Nom Prénom - Ville"
labels: ["avis-recherche"]

body:
  - type: input
    id: nom
    attributes:
      label: Nom complet
      placeholder: Jean Dupont
    validations:
      required: true

  - type: input
    id: age
    attributes:
      label: Âge
      placeholder: "35"

  - type: input
    id: lieu
    attributes:
      label: Dernière localisation connue
      placeholder: Paris

  - type: textarea
    id: description
    attributes:
      label: Description physique
      placeholder: Taille, vêtements, signes distinctifs...

  - type: textarea
    id: circonstances
    attributes:
      label: Circonstances de disparition
      placeholder: Dernière fois vu...

  - type: input
    id: contact
    attributes:
      label: Contact
      placeholder: email ou téléphone

  - type: textarea
    id: infos
    attributes:
      label: Informations supplémentaires
